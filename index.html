<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixer Coin | وب‌سایت رسمی فیکسر کوین</title>
    <style>
        :root {
            --bg-color: #080b11;
            --card-bg: #121824;
            --primary: #00ffcc;
            --secondary: #0077ff;
            --text: #ffffff;
            --text-muted: #7e8f9f;
            --accent: #ff0055;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            text-align: right;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(8, 11, 17, 0.85);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 15px;
            font-size: 15px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--primary);
        }

        .btn-connect {
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: #000;
            color: var(--bg-color);
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 204, 0.5);
        }

        /* Hero & Presale */
        .hero-container {
            padding: 150px 8% 80px 8%;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            min-height: 90vh;
            gap: 40px;
        }

        .hero-text {
            flex: 1;
            min-width: 320px;
        }

        .hero-text h1 {
            font-size: 46px;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .hero-text h1 span {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .hero-text p {
            color: var(--text-muted);
            font-size: 18px;
            margin-bottom: 35px;
            max-width: 550px;
        }

        .contract-box {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 500px;
        }

        .contract-address {
            font-family: monospace;
            color: var(--primary);
            font-size: 14px;
            word-break: break-all;
            direction: ltr;
        }

        .btn-copy {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
            white-space: nowrap;
            margin-right: 10px;
        }

        .btn-copy:hover {
            background: var(--primary);
            color: var(--bg-color);
        }

        /* Presale Card */
        .presale-card {
            flex: 1;
            min-width: 340px;
            max-width: 460px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            position: relative;
        }
